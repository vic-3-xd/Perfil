<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <meta name="description" content="Formulario de contacto">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header>
      <nav class="nav">
        <img src="img/logo.png" alt="Escuela" width="70" >
        <a href="index.html">Inicio</a>
        <a href="contacto.html">Contacto</a>
      </nav>
    </header>
    <main class="caja3">
      <h1>Formulario de contacto</h1>
      <form method="post" action="#">
        <label class="Nombre" for="Nombre">Nombre:</label>
        <input
          type="text"
          id="Nombre"
          name="Nombre"
          required
          placeholder="Nombre"
        >
        <br>
        <label class="Correo" for="Correo">Correo:</label>
        <input
          type="email"
          id="Correo"
          name="Correo"
          required
          placeholder="usuario@ejemplo.com"
        >
        <br>
        <label class="Mensaje" for="Mensaje">Mensaje:</label>
        <textarea
          name="Mensaje"
          id="Mensaje"
          required
          placeholder="Escribe tu mensaje aquí"
        ></textarea>
        <button type="submit">Enviar</button>
      
      </form>
    </main>


    <footer >
      <small
        >&copy; Programación 2026.Complejo Educacional Principe de Gales.</small
      >
    </footer>
  </body>
</html>
